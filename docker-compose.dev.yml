services:
  postgres:
    image: postgres:latest
    container_name: rc_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: rc_user
      POSTGRES_PASSWORD: rc_password
      POSTGRES_DB: recovery_companion
    volumes:
      - rc_pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rc_user -d recovery_companion']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rc_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - rc_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rc_pgadmin
    restart: unless-stopped
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@rc.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  rc_pgdata:
  rc_redisdata:
