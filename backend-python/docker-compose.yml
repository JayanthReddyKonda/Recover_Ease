# -- Recovery Companion -- Production Docker Stack --
# Usage:
#   1. Create .env file with your real keys (see .env.example)
#   2. docker compose --env-file .env up --build -d
# -------------------------------------------------------

services:
  # -- PostgreSQL --
  postgres:
    image: postgres:16-alpine
    container_name: rc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rc_network

  # -- Redis --
  redis:
    image: redis:7-alpine
    container_name: rc_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rc_network

  # -- FastAPI Backend --
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rc_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-70b-versatile}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM:-Recovery Companion <onboarding@resend.dev>}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-recovery_companion_whatsapp}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Recovery Companion}
      PORT: 8000
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      NODE_ENV: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - rc_network

  # -- Frontend (nginx) --
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
    container_name: rc_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rc_network

  # -- Ngrok (static domain tunnel) --
  ngrok:
    image: ngrok/ngrok:latest
    container_name: rc_ngrok
    restart: unless-stopped
    command: http backend:8000 --url=sun-unupset-pursuingly.ngrok-free.dev --log=stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rc_network

networks:
  rc_network:
    driver: bridge
